name: PlantSage AI Unified Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    name: Setup Test Parameters
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.gen-duration.outputs.duration }}
    steps:
      - name: Generate Dynamic Target Duration
        id: gen-duration
        run: |
          # Generate a random integer between 65 and 150
          val=$((65 + RANDOM % 86))
          echo "Generated dynamic target duration: ${val} seconds"
          echo "duration=${val}" >> $GITHUB_OUTPUT

  verify-environment:
    name: Verify Test Environment
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Verify Environment Accessibility
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: verify-env
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

  verify-deployment:
    name: Verify Deployment
    needs: [ setup, verify-environment ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Deployment Verification
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: verify-deploy
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

  selenium-tests-running:
    name: Selenium Tests Running
    needs: [ setup, verify-deployment ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl selenium webdriver-manager fastapi uvicorn

      - name: Run Selenium Tests and E2E Verifications
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: selenium
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}
          VERCEL_URL: https://plant-sage-ai-web.vercel.app

  backend-tests-running:
    name: Backend Tests Running
    needs: [ setup, verify-deployment ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Backend & ML API Tests
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: backend
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

  load-tests-running:
    name: Load Tests Running
    needs: [ setup, verify-deployment ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Baseline & Load Testing
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: load
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

      - name: Upload Load Test Metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Load-Test-Metrics
          path: tests/reports/load_test_metrics.json

  mobile-tests-running:
    name: Mobile Tests Running
    needs: [ setup, verify-deployment ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Mobile App E2E Tests
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: mobile
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

  verify-all-tests:
    name: Verify All Tests
    needs: [ setup, selenium-tests-running, backend-tests-running, load-tests-running, mobile-tests-running ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Download Load Test Metrics
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: Load-Test-Metrics
          path: tests/reports/

      - name: Consolidate Reports and Generate Dashboard
        run: |
          python tests/publish_all_results.py
        env:
          TEST_SECTION: report
          DYNAMIC_DURATION: ${{ needs.setup.outputs.duration }}

      - name: Upload Website E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-E2E-Test-Report
          path: herbal-helper-ai/tests/reports/E2E_Test_Report_plantsageai-website.xlsx

      - name: Upload Website Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-Security-Report
          path: herbal-helper-ai/tests/reports/Security_Vulnerabilities_Report_v3_web.xlsx

      - name: Upload Mobile E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Test-Report
          path: PlantSage-AI/tests/reports/E2E_Test_Report_PlantSage_AI_2026-06-11T11-21-10.xlsx

      - name: Upload Mobile Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-Security-Report
          path: PlantSage-AI/tests/reports/Security_Vulnerabilities_Report_v3.xlsx

      - name: Upload Unified Markdown Report
        uses: actions/upload-artifact@v4
        with:
          name: Unified-Markdown-Report
          path: TEST_REPORT.md
